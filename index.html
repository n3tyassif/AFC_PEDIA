function remplirGrille(listeDeJeux, idDeLaGrille) {
    const grille = document.getElementById(idDeLaGrille);

<script type="module">
        import * as THREE from 'three';

        const canvas = document.querySelector('#world-3d');
        const univers = [
          
            { type: 'image', url: 'https://res.cloudinary.com/dyhcasitx/image/upload/w_800,f_auto,q_auto/IMG_0256_sde1jg',titre: "la profondeur d'esprit"},
            { type: 'image', url: 'https://res.cloudinary.com/dyhcasitx/image/upload/w_800,f_auto,q_auto/IMG_4479_i8y8jl',titre: "morning routine"},
            { type: 'image', url: 'https://res.cloudinary.com/dyhcasitx/image/upload/w_800,f_auto,q_auto/IMG_4305_ttteux',titre: "l'elegance" },
            { type: 'image', url: 'https://res.cloudinary.com/dyhcasitx/image/upload/w_800,f_auto,q_auto/Screenshot_20250829-1909022_ut48t3' ,titre: "la gollumisation." },
            { type: 'image', url: 'https://res.cloudinary.com/dyhcasitx/image/upload/w_800,f_auto,q_auto/IMG_3747_vbt1wx',titre: "abasourdissant" },
            { type: 'image', url: 'https://res.cloudinary.com/dyhcasitx/image/upload/w_800,f_auto,q_auto/Snapchat-1544530563_cipcvm ',titre: "gamberge" },
            { type: 'image', url: 'https://res.cloudinary.com/dyhcasitx/image/upload/w_800,f_auto,q_auto/image-112_e2mrjs' ,titre: "l'amour sans frontiere " },
            { type: 'image', url: 'https://res.cloudinary.com/dyhcasitx/image/upload/w_800,f_auto,q_auto/F_JeKZoWUAAPntE_ydjb1a',titre: "epstein" },
            { type: 'video', url: 'https://res.cloudinary.com/dyhcasitx/video/upload/v1776419424/samples/sea-turtle.mp4' }
        ];

        // --- SCÈNE ET CAMÉRA ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / 700, 0.1, 1000);
        camera.position.z = 8;

const isMobile = window.innerWidth < 768;

const renderer = new THREE.WebGLRenderer({ 
    canvas, 
    alpha: true, 
    antialias: false,
    powerPreference: "high-performance"
});

const manager = new THREE.LoadingManager();

const textureLoader = new THREE.TextureLoader(manager);
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const group = new THREE.Group();


let hoveredObject = null;



renderer.setPixelRatio(isMobile ? 1 : Math.min(window.devicePixelRatio, 1.5)); 
renderer.setSize(window.innerWidth, window.innerHeight);

const progressBar = document.getElementById('progress-bar');

manager.onProgress = function (url, itemsLoaded, itemsTotal) {
    if (progressBar) {
        const progress = (itemsLoaded / itemsTotal) * 100;
        progressBar.style.width = progress + '%';
    }
};

manager.onLoad = function () {
    setTimeout(() => {
        const loaderWrapper = document.getElementById('loader-wrapper');
        if (loaderWrapper) {
            loaderWrapper.style.opacity = '0';
            setTimeout(() => { loaderWrapper.style.display = 'none'; }, 500);
        }
    }, 200); 
};

univers.forEach((item, index) => {
    let texture;

    const isVideo = item.type === 'video' || item.url.includes('.mp4');

    if (isVideo) {
        const video = document.createElement('video');
        video.src = item.url; 
        video.muted = true;
        video.loop = true;
        video.playsInline = true;
        video.crossOrigin = "anonymous";
        
        video.play().catch(e => console.log("Vidéo en attente d'interaction"));

        texture = new THREE.VideoTexture(video);
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.colorSpace = THREE.SRGBColorSpace;
    } else {
        texture = textureLoader.load(item.url);
        texture.colorSpace = THREE.SRGBColorSpace;
    }

    const geometry = new THREE.PlaneGeometry(1.5, 2);
    const material = new THREE.MeshBasicMaterial({ 
        map: texture, 
        side: THREE.DoubleSide,
        transparent: true 
    });
    
    const mesh = new THREE.Mesh(geometry, material);


    const total = univers.length;
    const phi = Math.acos(-1 + (2 * index) / total);
    const theta = Math.sqrt(total * Math.PI) * phi;

    mesh.position.setFromSphericalCoords(4, phi, theta);
    mesh.lookAt(0, 0, 0);

    mesh.userData = { 
        titre: item.titre || "Vidéo", 
        url: item.url, 
        type: isVideo ? 'video' : 'image', 
        phi: phi,
        theta: theta 
    };

    group.add(mesh);
});

scene.add(group);

window.showFromSearch = (index) => {
    const barre = document.getElementById('input-recherche');
    const value = barre ? barre.value : "";
    const hits = fuse.search(value);

    if (hits[index]) {
        const item = hits[index].item;
        const modal = document.getElementById("modal-univers");
        const modalMedia = document.getElementById("modal-media");
        const modalTitre = document.getElementById("modal-titre");

        modalTitre.innerText = ""; 
        modalMedia.innerHTML = `
            <div style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; min-height: 80vh;">
                <div style="position: relative; width: fit-content;">
                    <a href="${item.twitch || '#'}" target="_blank">
                        <img src="${item.img}" style="max-width: 90vw; max-height: 80vh; border-radius: 15px;">
                    </a>
                    <div style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 100%; text-align: center; color: white; font-family: 'Inter', sans-serif; font-size: 2.2em; text-shadow: 0 4px 15px rgba(0,0,0,0.9); pointer-events: none;">
                        ${item.nom || ""}
                    </div>
                </div>
            </div>
        `;
        modal.style.display = "block";
    }
};
window.ouvrirOverlay3D = (d) => {
    const modal = document.getElementById("modal-univers");
    const modalMedia = document.getElementById("modal-media");
    const modalTitre = document.getElementById("modal-titre");

    modalTitre.innerText = d.titre;
    modalMedia.innerHTML = d.type === 'video' ? 
        `<video src="${d.url}" controls autoplay loop muted style="max-width:100%; border-radius:10px;"></video>` :
        `<img src="${d.url}" style="max-width:100%; border-radius:10px;">`;
    
    modal.style.display = "block";
};

window.addEventListener('mousemove', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
});

window.addEventListener('click', () => {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(group.children);

    if (intersects.length > 0) {
        const d = intersects[0].object.userData;
        
        const modal = document.getElementById("modal-univers");
        const modalMedia = document.getElementById("modal-media");
        const modalTitre = document.getElementById("modal-titre");

        if (modal && modalMedia && modalTitre) {     
            modalTitre.innerText = d.titre || "Sans titre"; 
            modalMedia.innerHTML = d.type === 'video' ? 
                `<video src="${d.url}" controls autoplay loop muted playsinline style="max-width:100%; border-radius:10px;"></video>` : 
                `<img src="${d.url}" style="max-width:100%; border-radius:10px;">`;
                
            modal.style.display = "block";
        }
    }
});

document.querySelector(".close-modal").onclick = () => { 
    const modal = document.getElementById("modal-univers");
    const modalMedia = document.getElementById("modal-media");
    modal.style.display = "none"; 
    modalMedia.innerHTML = ""; 
};


const inputRecherche = document.getElementById('recherche'); 
const resultsDiv = document.getElementById('results');

if (inputRecherche && resultsDiv) {
    inputRecherche.addEventListener('input', (e) => {
        const value = e.target.value.toLowerCase();

        if (value.length > 0) {
            const hits = fuse.search(value);
            if (hits.length > 0) {
                resultsDiv.innerHTML = hits.slice(0, 6).map((hit) => {
                    const item = hit.item;
                    const safeNom = item.nom.replace(/'/g, "\\'");
                    
                    return `
                        <div class="result-item" onclick="showFromSearchDirect('${safeNom}')">
                            <img src="${item.img}" onerror="this.src='https://via.placeholder.com/50x70?text=?'">
                            <div class="res-info">
                                <div style="color: white; font-size: 1.1em;margin-left: 9px;">${item.nom}</div>
                                <div style="color: #888; font-size: 0.9em;">Jeu</div>
                            </div>
                        </div>
                    `;
                }).join('');
                resultsDiv.style.display = 'block';
            } else {
                resultsDiv.innerHTML = '<div style="padding: 20px; color: #888; text-align: center;">Aucun résultat...</div>';
                resultsDiv.style.display = 'block';
            }
        } else {
            resultsDiv.style.display = 'none';
        }
    });

window.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
});


document.addEventListener('mouseleave', () => {
    mouse.x = -1000;
    mouse.y = -1000;

    if (hoveredObject) {
        hoveredObject.scale.set(1, 1, 1);
        hoveredObject = null;
    }
    canvas.style.cursor = 'default';
});
    let isVisible = true;

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        isVisible = entry.isIntersecting; 
    });
}, { threshold: 0.1 });

observer.observe(canvas);
let expansion = 0.1;
function animate() {
    requestAnimationFrame(animate);


    if (document.hidden) return;
    const scrollY = window.scrollY;
    const waitScroll = 620;
    const progress = scrollY > waitScroll ? (scrollY - waitScroll) / 500 : 0;

  
    const baseRadius = (4 + (progress * 15)) * expansion;


    if (group) group.rotation.y += 0.002;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(group.children);

    if (intersects.length > 0) {
        if (hoveredObject !== intersects[0].object) {
            canvas.style.cursor = 'pointer';
            hoveredObject = intersects[0].object;
        }
    } else {
        if (hoveredObject !== null) {
            canvas.style.cursor = 'default';
            hoveredObject = null;
        }
    }

   for (let i = 0; i < group.children.length; i++) {
        const obj = group.children[i];
        const data = obj.userData;
        
        let targetRadius = baseRadius;
        if (hoveredObject === obj) targetRadius += 0.8; 

       
        if (obj.currentRadius === undefined) obj.currentRadius = targetRadius;
        const diff = targetRadius - obj.currentRadius;
        
        if (Math.abs(diff) > 0.001) {
            obj.currentRadius += diff * 0.1;
            
            const phi = data.phi;
            const theta = data.theta;
            const r = obj.currentRadius;

            // Conversion coordonnées sphériques 3D
            obj.position.set(
                r * Math.cos(theta) * Math.sin(phi),
                r * Math.sin(theta) * Math.sin(phi),
                r * Math.cos(phi)
            );
            obj.lookAt(0, 0, 0);
        }
    }


    if (expansion < 1) {
        expansion += (1 - expansion) * 0.03; 
    }

    
    renderer.render(scene, camera);
}

animate();

function decodeEffect(elementId, targetText, speed = 1) {
    return new Promise((resolve) => {
        const element = document.getElementById(elementId);
        if (!element) return resolve();

        let iteration = 0;
        const japaneseChars = "フェミマースアーカイブ"; 
        
        // On cible le lien <a> s'il existe, sinon l'élément lui-même
        const link = element.querySelector('a');
        const displayTarget = link ? link : element;

        // --- ACTION : On rend l'élément visible au moment où l'animation démarre ---
        element.style.visibility = 'visible';
        element.classList.add('decoding');

        const interval = setInterval(() => {
            displayTarget.innerText = targetText
                .split("")
                .map((letter, index) => {
                    if(index < iteration) {
                        return targetText[index]; // Lettre finale fixée
                    }
                    // Caractère japonais aléatoire pendant le "décodage"
                    return japaneseChars[Math.floor(Math.random() * japaneseChars.length)];
                })
                .join("");

            if(iteration >= targetText.length) {
                clearInterval(interval);
                resolve();
            }

            iteration += speed / 3; 
        }, 50);
    });
}
